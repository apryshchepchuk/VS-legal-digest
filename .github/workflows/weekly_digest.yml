name: Weekly Digest

on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vp-vs-digest-weekly
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build weekly digest
        run: |
          python scripts/build_weekly_digest.py

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vp-vs-digest-weekly-${{ github.run_id }}
          path: |
            outputs/digest/
          if-no-files-found: warn
