name: Manual Find Case Decisions

on:
  workflow_dispatch:
    inputs:
      case_number:
        description: "Номер справи, наприклад 910/2517/24"
        required: true
        type: string
      date_from:
        description: "Дата від (YYYY-MM-DD)"
        required: true
        type: string
      date_to:
        description: "Дата до (YYYY-MM-DD)"
        required: true
        type: string
      instance_filter:
        description: "Інстанція: касац / апеляц / перша / або код"
        required: false
        type: string
      period_field:
        description: "Поле дати: adjudication_date або date_publ"
        required: true
        default: "adjudication_date"
        type: choice
        options:
          - adjudication_date
          - date_publ
      only_active:
        description: "Лише активні рішення"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: manual-find-case-decisions
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHONUNBUFFERED: "1"
      CASE_NUMBER: ${{ inputs.case_number }}
      DATE_FROM: ${{ inputs.date_from }}
      DATE_TO: ${{ inputs.date_to }}
      INSTANCE_FILTER: ${{ inputs.instance_filter }}
      PERIOD_FIELD: ${{ inputs.period_field }}
      ONLY_ACTIVE: ${{ inputs.only_active }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest dataset
        run: |
          python scripts/fetch_dataset.py

      - name: Find decisions by case number
        run: |
          python scripts/find_case_decisions.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: case-decisions-${{ github.run_id }}
          path: |
            outputs/case_search/
          if-no-files-found: warn
