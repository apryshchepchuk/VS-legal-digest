name: Manual Run

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vp-vs-digest-manual
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHONUNBUFFERED: "1"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Gemini API key
        shell: bash
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY is not set"
            exit 1
          fi
          echo "GEMINI_API_KEY detected"

      - name: Run pipeline
        run: |
          python scripts/fetch_dataset.py
          python scripts/extract_vp_postanovy.py
          python scripts/fetch_decision_texts.py
          python scripts/normalize_rtf.py
          python scripts/analyze_with_gemini.py
          python scripts/build_weekly_digest.py

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vp-vs-digest-manual-${{ github.run_id }}
          path: |
            outputs/digest/
            data/interim/
            data/processed/analysis/
          if-no-files-found: warn
