name: Manual Send Archive to Telegram

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vp-vs-digest-archive-telegram
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONUNBUFFERED: "1"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Telegram bot token
        shell: bash
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then
            echo "TELEGRAM_BOT_TOKEN is not set"
            exit 1
          fi
          echo "TELEGRAM_BOT_TOKEN detected"

      - name: Build archive Telegram post
        run: |
          python scripts/build_archive_telegram_post.py

      - name: Send to Telegram
        run: |
          python scripts/send_to_telegram.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vp-vs-digest-archive-telegram-${{ github.run_id }}
          path: |
            outputs/digest/
          if-no-files-found: warn
